# Security Dependencies Gate (T4)
#
# Fails the build on any open Dependabot alert with severity critical
# or high in a security-sensitive code path (auth, SSRF, webhook,
# content-extractor, signature/JWT). Other alerts remain visible in
# the GitHub UI but do not gate the merge queue.
#
# Configuration: scripts/security-deps-gate.config.yml
# Implementation: scripts/security-deps-gate.py

name: "Security Deps Gate"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-evaluate daily so a freshly disclosed CVE in a sensitive path
    # blocks future deploys even if no PR has touched the tree.
    - cron: "17 6 * * *"

permissions:
  contents: read
  security-events: read

jobs:
  deps-gate:
    name: Block on critical/high alerts in sensitive paths
    # Dependabot-triggered runs get a read-only token with NO access to Actions
    # secrets, so the App-token step below cannot mint a token there. The gate
    # only inspects main's Dependabot-alert state (alerts are not computed per
    # PR branch), so it is redundant on a PR anyway. Skip on Dependabot; the
    # push-to-main and daily schedule runs still enforce the gate.
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      # The default GITHUB_TOKEN cannot read the Dependabot alerts API (that
      # endpoint needs a token with "Dependabot alerts: read"; security-events
      # only covers code-scanning), so the gate 403'd on every run. Mint the
      # same GitHub App token deps-bump.yml uses, which has that permission.
      - name: Mint GitHub App token (reads Dependabot alerts)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DEPS_BOT_APP_ID }}
          private-key: ${{ secrets.DEPS_BOT_APP_PRIVATE_KEY }}

      - name: Run gate
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python3 scripts/security-deps-gate.py
