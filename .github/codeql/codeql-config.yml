# CodeQL Configuration for TMI
# https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning

name: "TMI CodeQL Config"

# Use security-extended queries for comprehensive analysis
queries:
  - uses: security-extended
  - uses: security-and-quality

# Path filters - exclude generated code and development-only scripts
paths-ignore:
  # Auto-generated OpenAPI code (contains many false positives from oapi-codegen)
  - api/api.go
  # CI-time checkout of the generated API client repo (ericfitz/tmi-clients).
  # OpenAPI-generator's stock template includes a Debug-gated httputil.DumpRequestOut
  # that logs request headers (incl. API key) when cfg.Debug=true — real pattern, but
  # third-party generated code we don't maintain here. Never enable Debug in production.
  - ".tmi-clients/**"
  # Development-only Python scripts (OAuth testing harness, deployment tools)
  # These intentionally log OAuth tokens/credentials for debugging purposes
  - scripts/oauth-client-callback-stub.py
  - scripts/setup-heroku-env.py
  - scripts/parse_cats_results.py

# Query filters to reduce false positives
query-filters:
  # Exclude clear-text logging alerts from Python dev scripts
  # These are development-only tools that intentionally log OAuth tokens for debugging
  - exclude:
      id: py/clear-text-logging-sensitive-data
  # Exclude go/log-injection - TMI's slogging package sanitizes all log messages
  # via SanitizeLogMessage() which removes control characters (CWE-117 mitigation).
  # CodeQL doesn't understand this sanitization, so we exclude the query.
  # See documentation below for details.
  - exclude:
      id: go/log-injection

# =============================================================================
# RESOLVED - Log Injection (go/log-injection) - EXCLUDED
# =============================================================================
# The TMI slogging package sanitizes all log messages by calling
# SanitizeLogMessage() which removes newlines, carriage returns, and tabs
# that could be used for log injection attacks (CWE-117).
#
# Implementation details (internal/slogging/):
#   - logger.go: Logger.Debug/Info/Warn/Error call SanitizeLogMessage()
#   - context.go: ContextLogger and FallbackLogger also sanitize
#   - redaction.go: SanitizeLogMessage() strips \n, \r, \t characters
#
# CodeQL's go/log-injection query doesn't recognize that data flowing through
# slogging methods is sanitized, resulting in false positives. Since all
# logging in TMI goes through slogging, we exclude this query entirely.
#
# The sanitization is tested in internal/slogging/logger_test.go.
# =============================================================================

# =============================================================================
# KNOWN FALSE POSITIVES - GORM Map-Based Queries (go/sql-injection)
# =============================================================================
# CodeQL flags GORM's map-based Where() queries as SQL injection vulnerabilities.
# These are FALSE POSITIVES because GORM parameterizes all values internally.
#
# Pattern flagged:
#   db.Where(map[string]interface{}{"column_name": userValue}).First(&entity)
#
# Why it's safe:
#   1. Map keys are hard-coded field names (not user input)
#   2. GORM converts keys to column names via its naming strategy
#   3. Values are parameterized - GORM generates "WHERE column = ?" with bound params
#   4. This pattern is used for Oracle cross-database compatibility
#
# Safe sub-patterns confirmed in the 2026-07 triage (all flagged, all FP):
#   a. Where(ColumnMap(dialect, map[string]any{...})) - ColumnMap/ColumnName/Col
#      (api/dialect_helpers.go) only case-fold hard-coded literal column names
#      for Oracle; user data never reaches the identifier position.
#   b. OrderByCol(dialect, "key", ...) - ORDER BY column is a hard-coded literal
#      (api/metadata_helpers.go).
#   c. clause.Expr{SQL: "? = ?", Vars: []any{Col(...), value}} - SQL string is a
#      constant; first ? renders as a quoted identifier from a literal, second is
#      a bound value (api/authorization_enrichment.go).
#
# Affected files (dismiss these alerts in GitHub as "False positive"; line numbers
# drift with the code - validate the pattern, not the line):
#   - api/admin_checker.go            (GetGroupUUIDsByNames)
#   - api/authorization_enrichment.go (user lookup queries)
#   - api/database_store_gorm.go      (resolveUserIdentifierToUUID)
#   - api/project_store_gorm.go       (project CRUD + validation)
#   - api/metadata_helpers.go         (metadata CRUD, map-Where + OrderByCol)
#   - api/team_middleware.go          (IsTeamMemberOrAdmin)
#   - api/team_store_gorm.go          (team relationship traversal)
#   - auth/repository/user_repository.go (GetByProviderID)
#
# Reason: "GORM map-based queries are parameterized internally"
# =============================================================================
# KNOWN FALSE POSITIVES - slogging sinks (go/clear-text-logging)
# =============================================================================
# CodeQL reports the generic Logger.Debug/Info/Warn/Error(format, args) methods in
# internal/slogging/ (and their ContextLogger/FallbackLogger equivalents) as
# clear-text-logging sinks because sensitive-typed config fields (Password,
# LLMAPIKey, etc.) COULD flow there. No caller actually passes secret values into
# log arguments (verified 2026-07); cmd/server/startup_checks.go logs setting KEY
# NAMES only, never values. Dismiss these as "False positive" rather than
# path-ignoring internal/slogging - a path ignore would also hide a genuine future
# leak, since every TMI log call sinks in that package.
# NOTE: TMI's log redaction is attribute-based; a secret interpolated directly into
# a format string would bypass it. Tracked as a hardening follow-up issue.
# =============================================================================
