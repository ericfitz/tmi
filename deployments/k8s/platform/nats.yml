apiVersion: v1
kind: Namespace
metadata:
  name: tmi-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: tmi-platform
data:
  nats.conf: |
    jetstream {
      store_dir: "/data/jetstream"
      max_memory_store: 256MB
      max_file_store: 2GB
    }
    http: 8222
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: tmi-platform
spec:
  serviceName: nats
  replicas: 1
  selector:
    matchLabels: { app: nats }
  template:
    metadata:
      labels: { app: nats }
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-c", "/etc/nats/nats.conf"]
          ports:
            - { name: client, containerPort: 4222 }
            - { name: monitor, containerPort: 8222 }
          volumeMounts:
            - { name: config, mountPath: /etc/nats }
            - { name: data, mountPath: /data/jetstream }
      volumes:
        - name: config
          configMap: { name: nats-config }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: tmi-platform
spec:
  selector: { app: nats }
  ports:
    - { name: client, port: 4222, targetPort: 4222 }
    - { name: monitor, port: 8222, targetPort: 8222 }
