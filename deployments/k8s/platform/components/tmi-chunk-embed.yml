apiVersion: tmi.dev/v1alpha1
kind: TMIComponent
metadata:
  name: tmi-chunk-embed
  namespace: tmi-platform
spec:
  image: tmi-chunk-embed:dev
  jobSubjects:
    - jobs.chunkembed.>
  inputMode: content-ref
  egress: allowlist
  allowlist:
    # DEFAULT: openInternet delegates host-exactness to your cloud egress
    # firewall (AWS Network Firewall / Azure Firewall / GCP Cloud NGFW) or a
    # managed-CNI FQDN policy. Metadata (169.254.169.254) is always denied and
    # RFC1918 ranges are excepted (no in-cluster lateral movement).
    #
    # Note: openInternet renders an IPv4 0.0.0.0/0 rule only. Because the policy
    # sets policyTypes: [Egress], all IPv6 egress is denied (fail-closed) — fine
    # for IPv4 endpoints; an IPv6-only endpoint needs an explicit cidrs entry.
    #
    # HARDEN for production — replace openInternet with ONE of:
    #   cidrs: ["<private-endpoint-subnet-CIDR>"]   # cloud MaaS via PrivateLink/PSC
    #   clusterPeers: [{ podSelector: { app: <in-cluster-embedder> } }]
    # and ensure a private DNS override resolves the endpoint host to the
    # private IP (otherwise it resolves to the public IP and bypasses the
    # private path).
    openInternet: true
    ports: [443]
  config:
    TMI_COMPONENT_NAME: tmi-chunk-embed
    TMI_NATS_URL: nats://nats.tmi-platform.svc:4222
    TMI_EMBEDDING_MODEL: text-embedding-3-small
    TMI_EMBEDDING_BASE_URL: https://api.openai.com/v1
    TMI_JOB_ACK_WAIT: 120s
  secretRefs:
    # The embedding API key is mounted from a K8s Secret as the env var
    # TMI_EMBEDDING_API_KEY. The Secret object is created out of band:
    #   kubectl -n tmi-platform create secret generic tmi-embedding \
    #     --from-literal=api-key=sk-...
    - name: TMI_EMBEDDING_API_KEY
      secretName: tmi-embedding
      secretKey: api-key
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  scaling:
    minReplicas: 0
    maxReplicas: 10
    queueDepthTarget: 5
