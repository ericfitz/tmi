apiVersion: tmi.dev/v1alpha1
kind: TMIComponent
metadata:
  name: tmi-extractor
  namespace: tmi-platform
spec:
  image: tmi-extractor:dev
  jobSubjects:
    - jobs.extract.ooxml
    - jobs.extract.pdf
    - jobs.extract.html
    - jobs.extract.plaintext
  inputMode: content-ref
  # egress: none — the parse sandbox reaches NATS only. No DNS, no
  # 169.254.169.254, no DB, no Redis, no internet.
  egress: none
  config:
    TMI_COMPONENT_NAME: tmi-extractor
    # An egress:none sandbox has NO DNS (the NetworkPolicy denies port 53),
    # so the NATS service name cannot be resolved. Reach NATS by ClusterIP
    # via the Kubernetes-injected service env var instead: $(NATS_SERVICE_HOST)
    # expands to the nats Service ClusterIP at pod start (same namespace).
    # kube-proxy DNATs the ClusterIP to the nats pod, which the egress policy
    # permits. This preserves true "no DNS" — opening DNS egress would create a
    # DNS-exfiltration channel for a parser exploit, defeating the sandbox.
    TMI_NATS_URL: nats://$(NATS_SERVICE_HOST):4222
    TMI_CONTENT_EXTRACTORS_WALL_CLOCK_BUDGET: 30s
    TMI_JOB_ACK_WAIT: 90s
  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  scaling:
    minReplicas: 0
    maxReplicas: 10
    queueDepthTarget: 5
