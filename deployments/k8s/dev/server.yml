# NOTE: config-development.yml is delivered to this Deployment as a ConfigMap
# (not a Secret). This is intended for LOCAL dev clusters only. Never put real
# production secrets in config-development.yml — the prod-context guard in
# scripts/lib/deploy.py (via devenv.py) blocks deploying to non-local contexts,
# but treat this as plaintext.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tmi-server
  namespace: tmi-platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: tmi-server }
  template:
    metadata:
      labels: { app: tmi-server }
    spec:
      containers:
        - name: server
          image: localhost:5000/tmi-server:dev
          # The dev image always uses the :dev tag, so the default IfNotPresent
          # would keep running the node-cached image after `make restart-dev`
          # pushes new code. Always pull so a rebuild actually deploys.
          imagePullPolicy: Always
          args: ["--config=/etc/tmi/config.yml"]
          ports:
            - containerPort: 8080
          env:
            - { name: TMI_SERVER_INTERFACE, value: "0.0.0.0" }
            - { name: TMI_SERVER_PORT, value: "8080" }
            - { name: TMI_REDIS_HOST, value: "redis" }
            - { name: TMI_NATS_URL, value: "nats://nats.tmi-platform.svc:4222" }
            - { name: TMI_LOG_DIR, value: "/tmp/logs" }
            # Enable the built-in TMI OAuth provider for local dev authentication.
            # The tmi provider is a dev/test-only identity provider that supports
            # login_hint-based user creation without external OAuth credentials.
            - { name: OAUTH_PROVIDERS_TMI_ENABLED, value: "true" }
            # Allow http:// webhook target URLs in local dev. The integration
            # webhook tests register loopback receivers served over http; the
            # default (https-only) rejects them. Dev/local only — never set in prod.
            - { name: TMI_WEBHOOK_ALLOW_HTTP_TARGETS, value: "true" }
            # SSRF allowlist for webhook delivery. The integration webhook
            # receiver runs on the host; the server pod reaches it via
            # host.docker.internal. Allowlisting that host lets challenge/
            # delivery bypass the private-IP SSRF block. Dev/local only.
            - { name: TMI_SSRF_WEBHOOK_ALLOWLIST, value: "host.docker.internal" }
            # Auto-promote the first authenticated user to administrator when the
            # Administrators group is empty. Gives a local dev a working admin
            # without manual seeding, and the admin-promotion integration test
            # exercises this path. Dev/local convenience — default-off in prod.
            - { name: TMI_AUTH_AUTO_PROMOTE_FIRST_USER, value: "true" }
          volumeMounts:
            - name: config
              mountPath: /etc/tmi
              readOnly: true
          # Probe target `/` runs a full DB+Redis health check on every request,
          # so under heavy load (e.g. CATS fuzzing) it can exceed the default 1s
          # probe timeout. With tight probes Kubernetes then evicts/restarts a
          # server that is merely BUSY (not dead), crashlooping it mid-fuzz and
          # producing mass connection failures (issue #463). These dev probes are
          # deliberately tolerant: a busy server keeps serving, and only a truly
          # hung one is restarted. (Dev-only tuning; not the production posture.)
          #
          # The server starts its HTTP listener only AFTER Phase-2 migrations
          # complete. The startupProbe suspends the liveness and readiness probes
          # until the app first answers, so a slow first-boot migration is never
          # killed mid-flight (#479/#480). On Postgres migration is fast so this
          # budget is not consumed; kept identical to server-oracle.yml per the
          # keep-in-sync contract between the two manifests.
          startupProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            # Headroom so the single dev replica can absorb fuzz bursts without
            # CPU-starving the health-check path into probe timeouts (issue #463).
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 2000m, memory: 1Gi }
      volumes:
        - name: config
          configMap:
            name: tmi-server-config
---
apiVersion: v1
kind: Service
metadata:
  name: tmi-server
  namespace: tmi-platform
spec:
  # NodePort (not ClusterIP): the server is reached on the host at localhost:8080
  # via `kubectl port-forward` (deploy.py start_server_port_forward). The NodePort
  # is also used for high-throughput CATS runs against k3s (hit rp2:30080 directly
  # to bypass the userspace port-forward, which throttles under load — issue #463).
  # KEEP nodePort IN SYNC with scripts/lib/deploy.py NODE_PORT.
  type: NodePort
  selector: { app: tmi-server }
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
