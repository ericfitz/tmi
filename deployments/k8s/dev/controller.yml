apiVersion: v1
kind: ServiceAccount
metadata:
  name: tmi-controller
  namespace: tmi-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tmi-controller
rules:
  - apiGroups: ["tmi.dev"]
    resources: ["tmicomponents"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["tmi.dev"]
    resources: ["tmicomponents/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tmi-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tmi-controller
subjects:
  - kind: ServiceAccount
    name: tmi-controller
    namespace: tmi-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tmi-component-controller
  namespace: tmi-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tmi-component-controller
  template:
    metadata:
      labels:
        app: tmi-component-controller
    spec:
      serviceAccountName: tmi-controller
      containers:
        - name: controller
          image: localhost:5000/tmi-component-controller:dev
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
