apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: tmi-platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: cgr.dev/chainguard/redis:latest
          args: ["--save", "", "--appendonly", "no", "--bind", "0.0.0.0", "--protected-mode", "no"]
          ports:
            - containerPort: 6379
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: tmi-platform
spec:
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: 6379
