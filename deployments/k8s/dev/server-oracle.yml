# NOTE: config-development.yml is delivered to this Deployment as a ConfigMap
# (not a Secret). This is intended for LOCAL dev clusters only. Never put real
# production secrets in config-development.yml — the prod-context guard in
# scripts/lib/deploy.py (via devenv.py) blocks deploying to non-local contexts,
# but treat this as plaintext.
#
# Oracle variant: uses localhost:5000/tmi-server-oracle:dev and mounts the
# tmi-oracle-wallet Secret at /wallet (read-only). The Oracle container entrypoint
# reads /wallet/wallet.zip, extracts it to /tmp/wallet, and sets TNS_ADMIN and
# TMI_ORACLE_WALLET_LOCATION automatically — do NOT set those env vars here.
# The DB DSN comes from config-development.yml (database.url) via the ConfigMap.
#
# KEEP IN SYNC with server.yml (the Postgres counterpart): the two differ ONLY
# in the image ref and the wallet volume/mount. Mirror any change to the shared
# fields (env, probes, resources, config mount) into both manifests.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tmi-server
  namespace: tmi-platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: tmi-server }
  template:
    metadata:
      labels: { app: tmi-server }
    spec:
      containers:
        - name: server
          image: localhost:5000/tmi-server-oracle:dev
          # The dev image always uses the :dev tag, so the default IfNotPresent
          # would keep running the node-cached image after `make restart-dev`
          # pushes new code. Always pull so a rebuild actually deploys.
          imagePullPolicy: Always
          args: ["--config=/etc/tmi/config.yml"]
          ports:
            - containerPort: 8080
          env:
            - { name: TMI_SERVER_INTERFACE, value: "0.0.0.0" }
            - { name: TMI_SERVER_PORT, value: "8080" }
            - { name: TMI_REDIS_HOST, value: "redis" }
            - { name: TMI_NATS_URL, value: "nats://nats.tmi-platform.svc:4222" }
            - { name: TMI_LOG_DIR, value: "/tmp/logs" }
            # Enable the built-in TMI OAuth provider for local dev authentication.
            # The tmi provider is a dev/test-only identity provider that supports
            # login_hint-based user creation without external OAuth credentials.
            - { name: OAUTH_PROVIDERS_TMI_ENABLED, value: "true" }
            # Allow http:// webhook target URLs in local dev. The integration
            # webhook tests register loopback receivers served over http; the
            # default (https-only) rejects them. Dev/local only — never set in prod.
            - { name: TMI_WEBHOOK_ALLOW_HTTP_TARGETS, value: "true" }
            # SSRF allowlist for webhook delivery. The integration webhook
            # receiver runs on the host; the server pod reaches it via
            # host.docker.internal. Allowlisting that host lets challenge/
            # delivery bypass the private-IP SSRF block. Dev/local only.
            - { name: TMI_SSRF_WEBHOOK_ALLOWLIST, value: "host.docker.internal" }
            # Auto-promote the first authenticated user to administrator when the
            # Administrators group is empty. Gives a local dev a working admin
            # without manual seeding, and the admin-promotion integration test
            # exercises this path. Dev/local convenience — default-off in prod.
            - { name: TMI_AUTH_AUTO_PROMOTE_FIRST_USER, value: "true" }
            # Oracle ADB connection. In-cluster the pod cannot see the host's
            # scripts/oci-env.sh, so devenv.py packs TMI_DATABASE_URL + ORACLE_PASSWORD
            # into the tmi-oracle-db Secret (deploy.py create_oracle_db_secret) and we
            # surface them here. TMI_DATABASE_URL (oracle://...) 12-factor-overrides the
            # postgres database.url in config-development.yml; ORACLE_PASSWORD is the ADB
            # user password (auth/db/gorm.go). Without these the pod would dial postgres.
            # NOTE: the tmi-oracle-db Secret carries a LIVE ADB credential
            # (database URL + ORACLE_PASSWORD). Local kind dev only; never apply
            # to a non-local context (deploy.py _guard_context blocks that), and
            # avoid dumping it via `kubectl get secret -o yaml` in shared output.
            - name: TMI_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tmi-oracle-db
                  key: database-url
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tmi-oracle-db
                  key: oracle-password
          volumeMounts:
            - name: config
              mountPath: /etc/tmi
              readOnly: true
            - name: wallet
              mountPath: /wallet
              readOnly: true
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 1000m, memory: 512Mi }
      volumes:
        - name: config
          configMap:
            name: tmi-server-config
        - name: wallet
          secret:
            secretName: tmi-oracle-wallet
---
apiVersion: v1
kind: Service
metadata:
  name: tmi-server
  namespace: tmi-platform
spec:
  selector: { app: tmi-server }
  ports:
    - port: 8080
      targetPort: 8080
