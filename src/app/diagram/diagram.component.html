<div class="diagram-container">
  <app-diagram-toolbar 
    [diagramName]="diagramState.currentDiagram()?.name || 'Untitled Diagram'"
    [isDiagramLoaded]="!!diagramState.currentDiagram()"
    (save)="saveDiagram()"
    (close)="closeDiagram()">
  </app-diagram-toolbar>
  
  <div class="diagram-content">
    <!-- Loading indicator -->
    <div *ngIf="diagramState.isLoading()" class="loading-overlay">
      <div class="loading-spinner"></div>
      <span>Loading diagram...</span>
    </div>
    
    <!-- Error message -->
    <div *ngIf="diagramState.error()" class="error-message">
      {{ diagramState.error()?.message || 'An error occurred' }}
    </div>
    
    <!-- Diagram canvas -->
    <app-diagram-canvas *ngIf="diagramState.currentDiagram()"></app-diagram-canvas>
  </div>
</div>
