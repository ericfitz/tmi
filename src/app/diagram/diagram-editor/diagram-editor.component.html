<div class="diagram-editor">
  <h2>{{ 'DIAGRAM.EDITOR.DIAGRAM_NAME' | translate }}</h2>
  
  <div class="editor-container">
    <!-- Canvas for drawing diagrams goes here -->
    <app-diagram-canvas></app-diagram-canvas>
  </div>
  
  <div class="properties-panel">
    <h3>{{ 'DIAGRAM.EDITOR.PROPERTIES' | translate }}</h3>
    
    <div class="property-item">
      <label for="gridSize">{{ 'DIAGRAM.EDITOR.GRID_SIZE' | translate }}</label>
      <input type="number" id="gridSize" min="5" max="50" step="5" />
    </div>
    
    <div class="property-item">
      <label for="snapToGrid">{{ 'DIAGRAM.EDITOR.SNAP_TO_GRID' | translate }}</label>
      <input type="checkbox" id="snapToGrid" />
    </div>
    
    <div class="property-item">
      <label for="backgroundColor">{{ 'DIAGRAM.EDITOR.BACKGROUND_COLOR' | translate }}</label>
      <input type="color" id="backgroundColor" />
    </div>
  </div>
</div>
