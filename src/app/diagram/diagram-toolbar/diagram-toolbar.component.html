<div class="diagram-toolbar">
  <div class="toolbar-left">
    <!-- File operations (always visible) - Left justified -->
    <div class="toolbar-section file-operations">
      <button (click)="newDiagram()" [title]="'DIAGRAM.TOOLBAR.NEW' | translate">
        <fa-icon [icon]="faFile" class="icon"></fa-icon>
        {{ 'DIAGRAM.TOOLBAR.NEW' | translate }}
      </button>
      
      <button (click)="openDiagram()" [title]="'DIAGRAM.TOOLBAR.OPEN' | translate">
        <fa-icon [icon]="faFolderOpen" class="icon"></fa-icon>
        {{ 'DIAGRAM.TOOLBAR.OPEN' | translate }}
      </button>
      
      <!-- Save and Close only visible when a diagram is loaded -->
      <ng-container *ngIf="isDiagramLoaded">
        <button (click)="onSave()" 
          [disabled]="!diagramState.hasChanges()"
          [title]="'DIAGRAM.TOOLBAR.SAVE' | translate">
          <fa-icon [icon]="faFloppyDisk" class="icon"></fa-icon>
          {{ 'DIAGRAM.TOOLBAR.SAVE' | translate }}
        </button>
        
        <button (click)="closeDiagram()" 
          [title]="'DIAGRAM.TOOLBAR.CLOSE' | translate">
          <fa-icon [icon]="faXmark" class="icon"></fa-icon>
          {{ 'DIAGRAM.TOOLBAR.CLOSE' | translate }}
        </button>
      </ng-container>
    </div>
    
    <!-- Other operations - Left justified -->
    <ng-container *ngIf="isDiagramLoaded">
      
      <div class="toolbar-section element-operations">
        <button (click)="addProcess()" [title]="'DIAGRAM.TOOLBAR.ADD_PROCESS' | translate">
          <fa-icon [icon]="faSquare" class="icon"></fa-icon>
          {{ 'DIAGRAM.TOOLBAR.ADD_PROCESS' | translate }}
        </button>
        
        <button (click)="deleteSelected()" [title]="'DIAGRAM.TOOLBAR.DELETE' | translate">
          <fa-icon [icon]="faTrash" class="icon"></fa-icon>
          {{ 'DIAGRAM.TOOLBAR.DELETE' | translate }}
        </button>
      </div>
      
      <div class="toolbar-section view-operations">
        <button (click)="toggleGrid()" [title]="'DIAGRAM.TOOLBAR.TOGGLE_GRID' | translate">
          <fa-icon [icon]="faTable" class="icon"></fa-icon>
          {{ 'DIAGRAM.TOOLBAR.TOGGLE_GRID' | translate }}
        </button>
      </div>
    </ng-container>
  </div>
  
  <!-- Right side of toolbar for file info -->
  <ng-container *ngIf="isDiagramLoaded">
    <div class="toolbar-right">
      <div class="toolbar-section file-info">
        <span class="file-name" [class.unsaved]="diagramState.hasChanges()">
          {{ diagramName }}{{ diagramState.hasChanges() ? '*' : '' }}
        </span>
      </div>
    </div>
  </ng-container>
</div>
