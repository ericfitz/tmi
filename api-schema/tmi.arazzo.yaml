- workflowId: threat_model_full_crud
  summary: Threat Model Full Crud
  description: Complete end-to-end workflow for threat model full crud
  steps:
  - stepId: threat_model_full_cr_tmi_list_authorize
    description: Start OAuth authorization flow with PKCE
    operationId: authorizeOAuthProvider
    successCriteria:
    - condition: $statusCode == 200
  - stepId: threat_model_full_cr_tmi_list_callback
    description: Receive authorization code
    operationId: handleOAuthCallback
    successCriteria:
    - condition: $statusCode == 200
  - stepId: threat_model_full_cr_tmi_create_token
    description: Exchange code for access token using code_verifier
    operationId: exchangeOAuthCode
    successCriteria:
    - condition: $statusCode == 201 || $statusCode == 200
    outputs:
      resource_id: $response.body.id
  - stepId: threat_model_full_cr_tmi_create_threat_model
    description: Create threat model
    operationId: createThreatModel
    dependsOn:
    - threat_model_full_cr_tmi_create_token
    successCriteria:
    - condition: $statusCode == 201 || $statusCode == 200
    outputs:
      threat_model_id: $response.body.id
  - stepId: threat_model_full_cr_tmi_list_threat_model
    description: List threat models
    operationId: listThreatModels
    dependsOn:
    - threat_model_full_cr_tmi_create_token
    successCriteria:
    - condition: $statusCode == 200
  - stepId: threat_model_full_cr_tmi_get_threat_model
    description: Get specific threat model
    operationId: getThreatModel
    dependsOn:
    - threat_model_full_cr_tmi_create_token
    - threat_model_full_cr_tmi_create_threat_model
    successCriteria:
    - condition: $statusCode == 200
  - stepId: threat_model_full_cr_tmi_update_threat_model
    description: Update threat model
    operationId: updateThreatModel
    dependsOn:
    - threat_model_full_cr_tmi_create_token
    - threat_model_full_cr_tmi_create_threat_model
    successCriteria:
    - condition: $statusCode == 200
  - stepId: threat_model_full_cr_tmi_patch_threat_model
    description: Partially update threat model
    operationId: patchThreatModel
    dependsOn:
    - threat_model_full_cr_tmi_create_token
    - threat_model_full_cr_tmi_create_threat_model
    successCriteria:
    - condition: $statusCode == 200
  - stepId: threat_model_full_cr_tmi_delete_threat_model
    description: Delete threat model
    operationId: deleteThreatModel
    dependsOn:
    - threat_model_full_cr_tmi_create_token
    - threat_model_full_cr_tmi_create_threat_model
    successCriteria:
    - condition: $statusCode == 204 || $statusCode == 200
  outputs:
    resource_id: $steps.threat_model_full_cr_tmi_create_token.outputs.resource_id
    threat_model_id: $steps.threat_model_full_cr_tmi_create_threat_model.outputs.threat_model_id
- workflowId: asset_full_crud
  summary: Asset Full Crud
  description: Complete end-to-end workflow for asset full crud
  steps:
  - stepId: asset_full_crud_tmi_list_authorize
    description: Start OAuth flow
    operationId: authorizeOAuthProvider
    successCriteria:
    - condition: $statusCode == 200
  - stepId: asset_full_crud_tmi_list_callback
    description: Complete OAuth callback
    operationId: handleOAuthCallback
    successCriteria:
    - condition: $statusCode == 200
  - stepId: asset_full_crud_tmi_create_token
    description: Get access token
    operationId: exchangeOAuthCode
    successCriteria:
    - condition: $statusCode == 201 || $statusCode == 200
    outputs:
      resource_id: $response.body.id
  - stepId: asset_full_crud_tmi_create_threat_model
    description: Create parent threat model
    operationId: createThreatModel
    dependsOn:
    - asset_full_crud_tmi_create_token
    successCriteria:
    - condition: $statusCode == 201 || $statusCode == 200
    outputs:
