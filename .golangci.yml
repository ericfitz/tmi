# golangci-lint v2 configuration
version: "2"

linters:
  enable:
    # Existing linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gocyclo
    - gosec
    - misspell
    - unconvert
    # Bug-catching linters
    - bodyclose        # HTTP response body closure
    - nilerr           # nil return when err != nil
    - nilnesserr       # wrong nil error returned
    - errorlint        # correct error wrapping (errors.Is/As)
    - forcetypeassert  # unguarded type assertions
    - durationcheck    # time.Duration arithmetic bugs
    - sqlclosecheck    # unclosed sql.Rows/Stmt
    # Code quality linters
    - gocritic         # broad bug/style/performance checks
    - predeclared      # shadowing of builtins
    - musttag          # missing tags on marshaled structs
    - sloglint         # consistent slog usage
    - nolintlint       # validates nolint directives
    - wastedassign     # assignments never read
  disable:
    - lll
    - revive
    - unused
    - unparam
    # goconst disabled: dominant repeated strings in this codebase are RFC-defined
    # OAuth/HTTP error codes (`invalid_request`, `server_error`, etc.), SQL column
    # names in dbschema, JSON field names, and test fixtures. Extracting them into
    # constants adds indirection without improving correctness. Apply case-by-case
    # in review rather than via blanket lint.
    - goconst
  exclusions:
    rules:
      # Exclude generated api.go file from all linters
      - path: "^api/api\\.go$"
        linters:
          - errcheck
          - govet
          - ineffassign
          - staticcheck
          - gocyclo
          - gosec
          - misspell
          - unconvert
          - bodyclose
          - nilerr
          - nilnesserr
          - errorlint
          - forcetypeassert
          - durationcheck
          - sqlclosecheck
          - goconst
          - gocritic
          - predeclared
          - musttag
          - sloglint
          - nolintlint
          - wastedassign
      # forcetypeassert: Test files use unguarded assertions for mock returns and JSON parsing
      - path: "_test\\.go$"
        linters:
          - forcetypeassert
      # G101: Test files legitimately use hardcoded test credentials
      - path: "_test\\.go$"
        linters:
          - gosec
        text: "G101:"
      # G115: Integer overflow conversions are safe in context (test helpers)
      - path: "_test\\.go$"
        linters:
          - gosec
        text: "G115:"
      # G124: Test cookies don't need Secure/HttpOnly/SameSite — they exist to drive handler logic, not protect real sessions
      - path: "_test\\.go$"
        linters:
          - gosec
        text: "G124:"

formatters:
  enable:
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0