---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: tmicomponents.tmi.dev
spec:
  group: tmi.dev
  names:
    kind: TMIComponent
    listKind: TMIComponentList
    plural: tmicomponents
    shortNames:
    - tmicomp
    singular: tmicomponent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.egress
      name: Egress
      type: string
    - jsonPath: .spec.inputMode
      name: Input
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: TMIComponent declares a TMI Component Platform worker type.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TMIComponentSpec is the desired state of a component type.
            properties:
              allowlist:
                description: Allowlist is required when Egress is "allowlist", ignored
                  otherwise.
                properties:
                  cidrs:
                    description: |-
                      CIDRs are stable destination ranges rendered as NetworkPolicy ipBlock
                      egress rules. Use for an in-cluster VM, a cloud private-endpoint subnet,
                      or a known API VIP. Validation rejects 0.0.0.0/0 and any range covering
                      the metadata IP.
                    items:
                      type: string
                    type: array
                  clusterPeers:
                    description: |-
                      ClusterPeers are in-cluster destinations rendered as namespace/pod-selector
                      egress rules (e.g. an in-cluster embedder Service's pods).
                    items:
                      description: |-
                        ClusterPeer selects an in-cluster egress destination by namespace and pod
                        labels. At least one of NamespaceSelector / PodSelector must be set.
                      properties:
                        namespaceSelector:
                          additionalProperties:
                            type: string
                          description: |-
                            NamespaceSelector matches destination namespaces by label. When empty,
                            the rule is not namespace-scoped (matches pods in any namespace by the
                            PodSelector).
                          type: object
                        podSelector:
                          additionalProperties:
                            type: string
                          description: PodSelector matches destination pods by label.
                          type: object
                        ports:
                          description: Ports the rule applies to. Defaults to TCP/443
                            when empty.
                          items:
                            format: int32
                            type: integer
                          type: array
                      type: object
                    type: array
                  openInternet:
                    description: |-
                      OpenInternet, when true, renders broad egress (0.0.0.0/0 minus RFC1918 and
                      minus the metadata IP) on the declared ports. Host-exactness is DELEGATED
                      to operator infrastructure (cloud egress firewall / managed-CNI FQDN
                      policy). The explicit escape hatch for a target that cannot be reduced to
                      a CIDR (public-SaaS model APIs).
                    type: boolean
                  ports:
                    description: Ports the egress rules apply to. Defaults to TCP/443
                      when empty.
                    items:
                      format: int32
                      type: integer
                    type: array
                type: object
              config:
                additionalProperties:
                  type: string
                description: |-
                  Config holds non-secret component-local config values, passed to the
                  worker as environment variables.
                type: object
              egress:
                description: Egress is the network posture; drives the rendered NetworkPolicy.
                enum:
                - none
                - fetch-controlled
                - allowlist
                type: string
              image:
                description: Image is the worker container image.
                type: string
              inputMode:
                description: InputMode declares how the component receives job input.
                enum:
                - content-ref
                - source-locator
                type: string
              jobSubjects:
                description: JobSubjects are the JetStream subjects this component
                  consumes.
                items:
                  type: string
                minItems: 1
                type: array
              resources:
                description: Resources sets the worker pod CPU/memory limits (the
                  cgroup caps).
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              scaling:
                description: Scaling configures KEDA autoscaling.
                properties:
                  maxReplicas:
                    format: int32
                    minimum: 1
                    type: integer
                  minReplicas:
                    format: int32
                    minimum: 0
                    type: integer
                  queueDepthTarget:
                    description: |-
                      QueueDepthTarget is the JetStream pending-message count per replica
                      KEDA scales toward.
                    format: int32
                    minimum: 1
                    type: integer
                required:
                - maxReplicas
                - minReplicas
                - queueDepthTarget
                type: object
              scratchVolume:
                description: ScratchVolume optionally requests a writable emptyDir.
                properties:
                  mountPath:
                    description: MountPath is where the emptyDir is mounted in the
                      worker container.
                    type: string
                  sizeLimit:
                    anyOf:
                    - type: integer
                    - type: string
                    description: |-
                      SizeLimit caps the emptyDir (e.g. "512Mi"). Serialized as a string
                      in YAML; validated as a Kubernetes quantity at admission time.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                required:
                - mountPath
                - sizeLimit
                type: object
              secretRefs:
                description: SecretRefs reference Kubernetes Secrets wired into the
                  worker pod.
                items:
                  description: |-
                    SecretRef points to a key in a Kubernetes Secret. Secrets are NEVER
                    inlined in a TMIComponent — only referenced.
                  properties:
                    name:
                      description: Name is the logical name the worker uses to find
                        this secret.
                      type: string
                    secretKey:
                      description: SecretKey is the key within that Secret.
                      type: string
                    secretName:
                      description: SecretName is the Kubernetes Secret object name.
                      type: string
                  required:
                  - name
                  - secretKey
                  - secretName
                  type: object
                type: array
            required:
            - egress
            - image
            - inputMode
            - jobSubjects
            - resources
            - scaling
            type: object
          status:
            description: TMIComponentStatus is the observed state.
            properties:
              conditions:
                description: Conditions follows the standard Kubernetes condition
                  pattern.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
